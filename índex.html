<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cyber Hack Interface</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at center, #020202, #000000);
      color: #00ff9c;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      height: 100vh;
    }

    .left, .right {
      padding: 15px;
    }

    .panel {
      border: 1px solid rgba(0,255,156,0.3);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      background: rgba(0,255,156,0.05);
      box-shadow: 0 0 15px rgba(0,255,156,0.1);
    }

    .title {
      font-size: 14px;
      margin-bottom: 8px;
      opacity: 0.7;
    }

    #terminal {
      height: 250px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.4;
    }

    .progress-bar {
      height: 10px;
      background: rgba(0,255,156,0.2);
      border-radius: 5px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #00ff9c;
      transition: width 0.3s;
    }

    .map {
      height: 200px;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,255,156,0.05),
        rgba(0,255,156,0.05) 1px,
        transparent 1px,
        transparent 20px
      );
      position: relative;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #00ff9c;
      border-radius: 50%;
      position: absolute;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }

    .matrix {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.05;
      pointer-events: none;
    }

    canvas { display: block; }

    .status {
      font-size: 12px;
      opacity: 0.8;
    }

  </style>
</head>
<body>

<canvas class="matrix"></canvas>

<div class="grid">
  <div class="left">
    <div class="panel">
      <div class="title">TERMINAL</div>
      <div id="terminal"></div>
    </div>

    <div class="panel">
      <div class="title">PROGRESSO DE INVASÃO</div>
      <div class="progress-bar"><div class="progress" id="progress"></div></div>
      <div class="status" id="status">Iniciando...</div>
    </div>
  </div>

  <div class="right">
    <div class="panel">
      <div class="title">REDE GLOBAL</div>
      <div class="map" id="map"></div>
    </div>

    <div class="panel">
      <div class="title">ALVO</div>
      <div class="status">IP: 192.168.0.1</div>
      <div class="status">LOCAL: Desconhecido</div>
      <div class="status">STATUS: Vulnerável</div>
    </div>
  </div>
</div>

<script>
const terminal = document.getElementById('terminal');
const progress = document.getElementById('progress');
const statusText = document.getElementById('status');
const map = document.getElementById('map');

const mensagens = [
  'Inicializando módulos...',
  'Escaneando portas...',
  'Encontrando vulnerabilidades...',
  'Explorando falha de segurança...',
  'Acessando sistema remoto...',
  'Extraindo dados...',
  'Invasão completa!'
];

let i = 0;
let percent = 0;

function digitar(texto, callback) {
  let j = 0;
  const interval = setInterval(() => {
    terminal.innerHTML += texto[j];
    terminal.scrollTop = terminal.scrollHeight;
    j++;
    if (j >= texto.length) {
      clearInterval(interval);
      terminal.innerHTML += '\n';
      setTimeout(callback, 400);
    }
  }, 30);
}

function loopMensagens() {
  if (i < mensagens.length) {
    statusText.innerText = mensagens[i];
    digitar(mensagens[i], () => {
      i++;
      percent += 15;
      progress.style.width = percent + '%';
      loopMensagens();
    });
  }
}

function criarPonto() {
  const dot = document.createElement('div');
  dot.classList.add('dot');
  dot.style.top = Math.random() * 180 + 'px';
  dot.style.left = Math.random() * 180 + 'px';
  map.appendChild(dot);

  setTimeout(() => dot.remove(), 1500);
}

setInterval(criarPonto, 300);
loopMensagens();

// MATRIX EFFECT
const canvas = document.querySelector('.matrix');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = '01';
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#00ff9c';
  ctx.font = fontSize + 'px monospace';

  for (let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);
</script>

</body>
</html>
